<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kirish — NaturMart Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ asset_url('css/admin.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🌿</div>
      <div class="login-logo-title">Natur<em>Mart</em></div>
      <div class="login-logo-subtitle">Admin Panel</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}
    <div class="flash flash-{{ cat }} login-flash">{{ msg }}</div>
    {% endfor %}{% endif %}{% endwith %}
    <form method="POST">
      <div class="form-group"><label>Login</label><input type="text" name="username" required autofocus placeholder="admin"></div>
      <div class="form-group"><label>Parol</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button type="submit" class="btn btn-green login-submit">Kirish</button>
    </form>
  </div>
</div>
</body>
</html>
